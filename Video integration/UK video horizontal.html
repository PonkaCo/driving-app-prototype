<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UK Drive – Landscape Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --brand:        #401971;
  --brand2:       #6B2ABC;
  --accent:       #FA5732;
  --bg:           #F2F0F5;
  --bg2:          #E9E7EB;
  --card:         #FCFCFC;
  --text:         #150826;
  --muted:        #797282;
  --success:      #00A850;
  --card-shadow:  0px 6px 30px 0px rgba(55,22,97,0.08);
  --upper-shadow: 0px -2px 24px 0px rgba(55,21,97,0.04);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: #2A1F4A;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

/* ─── Phone frame (landscape) ─── */
.phone {
  width: min(844px, calc(100vw - 40px));
  aspect-ratio: 844 / 390;
  background: #000;
  border-radius: 44px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 0 0 10px #1A1A2E, 0 0 0 12px #2E2E50, 0 32px 80px rgba(0,0,0,.65);
}

/* ─── Video ─── */
.vid-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}
.vid-scrim {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,.55) 0%, transparent 25%, transparent 55%, rgba(0,0,0,.7) 100%);
}

/* ─── Tap overlay — catches taps when controls are hidden ─── */
/*     z:3 so it's below controls (z:10) but above scrim (z:1)  */
/*     when pctrl is faded (pointer-events:none) this layer gets the tap */
#tap-overlay {
  position: absolute; inset: 0; z-index: 3;
}

/* ─── Seek flash indicators — shown on left/right seek taps ─── */
.seek-flash {
  position: absolute; top: 50%;
  transform: translateY(-50%);
  width: 62px; height: 62px;
  background: rgba(255,255,255,.2); border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-size: 10px; font-weight: 700; gap: 1px;
  opacity: 0; pointer-events: none; z-index: 9;
}
.seek-flash svg { width: 22px; height: 22px; }
#flash-l { left: 20%; transform: translate(-50%, -50%); }
#flash-r { right: 20%; transform: translate(50%, -50%); }
.seek-flash.pop { animation: sfPop .5s ease-out forwards; }
@keyframes sfPop {
  0%  { opacity: 0; transform: translate(var(--tx,-50%), -50%) scale(.75); }
  25% { opacity: 1; transform: translate(var(--tx,-50%), -50%) scale(1); }
  100%{ opacity: 0; transform: translate(var(--tx,-50%), -50%) scale(1.1); }
}
#flash-l { --tx: -50%; }
#flash-r { --tx:  50%; }

/* ─── Controls overlay — mirrors portrait player layout ─── */
.pctrl {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column; justify-content: space-between;
  transition: opacity .25s;
  cursor: pointer; /* whole area is tappable */
}
.pctrl.fade { opacity: 0; pointer-events: none; }

/* Top bar */
.pctrl-top {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 8px;
  background: linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
  cursor: default;
}
.pctrl-back {
  width: 34px; height: 34px;
  background: rgba(0,0,0,.4); border: none; border-radius: 50%; color: #fff;
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.pctrl-back svg { width: 18px; height: 18px; }
.pctrl-title {
  flex: 1; font-size: 14px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pctrl-vol-btn {
  width: 32px; height: 32px;
  background: none; border: none; color: rgba(255,255,255,.85);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; padding: 0;
}
.pctrl-vol-btn svg { width: 20px; height: 20px; }

/* Middle controls — frosted glass, same as portrait player */
.pctrl-mid {
  display: flex; align-items: center; justify-content: center; gap: 30px;
  cursor: default;
}
.seek-btn {
  width: 52px; height: 52px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  background: rgba(255,255,255,.16); backdrop-filter: blur(10px);
  border: none; border-radius: 50%; color: #fff; cursor: pointer;
  font-size: 10px; font-weight: 700;
}
.seek-btn svg { width: 22px; height: 22px; }
.p-play-btn {
  width: 56px; height: 56px;
  background: rgba(255,255,255,.16); backdrop-filter: blur(10px);
  border: none; border-radius: 50%; color: #fff;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.p-play-btn svg { width: 24px; height: 24px; }

/* Bottom bar — progress above time row, mirrors portrait pctrl-bot */
.pctrl-bot {
  padding: 8px 16px 14px;
  background: linear-gradient(to top, rgba(0,0,0,.55), transparent);
  cursor: default;
}
.prog-track-row {
  height: 3px; background: rgba(255,255,255,.3); border-radius: 2px;
  position: relative; cursor: pointer; margin-bottom: 8px;
}
.prog-fill {
  height: 100%; background: var(--brand2); border-radius: 2px;
  position: relative; width: 0%;
}
.prog-dot {
  width: 12px; height: 12px; background: #fff; border-radius: 50%;
  position: absolute; right: -6px; top: -5px;
  box-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.prog-bottom-row {
  display: flex; align-items: center; justify-content: space-between;
}
.prog-time-label { font-size: 12px; color: rgba(255,255,255,.85); font-weight: 600; }
/* Chevron button — opens video list sheet (replaces fullscreen btn) */
.go-list-btn {
  background: none; border: none; color: rgba(255,255,255,.85);
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; cursor: pointer; padding: 0;
}
.go-list-btn svg { width: 20px; height: 20px; }

/* ─── Sheet backdrop ─── */
.sheet-backdrop {
  position: absolute; inset: 0; z-index: 30;
  background: rgba(0,0,0,.4);
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.sheet-backdrop.vis { opacity: 1; pointer-events: all; }

/* ─── Bottom sheet — light theme (UI kit) ─── */
.sheet {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 40;
  height: 70%;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  box-shadow: var(--upper-shadow);
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.sheet.open { transform: translateY(0); }

.sheet-drag {
  width: 36px; height: 4px;
  background: var(--bg2); border-radius: 2px;
  margin: 10px auto 0; flex-shrink: 0;
}
.sheet-head {
  padding: 12px 14px 16px;
  border-bottom: 1px solid var(--bg2);
  flex-shrink: 0;
}
.sheet-title { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.2; }

.sheet-list {
  flex: 1; overflow-y: auto; scrollbar-width: none;
  padding: 0 14px 16px;
}
.sheet-list::-webkit-scrollbar { display: none; }

/* ─── un-card — exact match of vertical portrait player list ─── */
.un-card {
  display: flex; gap: 12px;
  padding: 8px;
  cursor: pointer;
  border-radius: 10px;
  transition: background .15s;
  margin: 0 -8px;
  position: relative;
}
.un-card:active { background: var(--bg2); }
.un-card.now    { background: var(--bg2); }

.un-thumb-wrap {
  width: 100px; flex-shrink: 0; border-radius: 8px;
  overflow: hidden; aspect-ratio: 16/9; position: relative;
}
.un-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
.un-dur {
  position: absolute; bottom: 3px; right: 4px;
  background: rgba(0,0,0,.75); color: #fff;
  font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
}

.un-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.un-num   { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 3px; }
.un-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }

.un-watched {
  position: absolute; top: 8px; right: 8px;
  width: 18px; height: 18px; background: var(--success);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  opacity: 0; z-index: 2; box-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.un-watched svg { width: 10px; height: 10px; }
.un-watched.show { opacity: 1; }

@keyframes animNext { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
@keyframes animPrev { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:translateX(0); } }
.anim-next { animation: animNext .25s ease; }
.anim-prev { animation: animPrev .25s ease; }
</style>
</head>
<body>

<div class="phone" id="phone">

  <img class="vid-bg" id="vid-bg" src="" alt="" />
  <div class="vid-scrim"></div>

  <!--
    #tap-overlay (z:3): always-on catch-all.
    When pctrl is visible (z:10, pointer-events:auto) pctrl blocks it → no double-fire.
    When pctrl is faded (pointer-events:none) this catches the tap → showCtrl().
  -->
  <div id="tap-overlay" onclick="showCtrl()"></div>

  <!-- Seek flash indicators — pointer-events:none, shown by JS -->
  <div class="seek-flash" id="flash-l">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
    10s
  </div>
  <div class="seek-flash" id="flash-r">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
    10s
  </div>

  <!-- Controls overlay -->
  <div class="pctrl" id="pctrl" onclick="onPctrlTap(event)">

    <div class="pctrl-top">
      <button class="pctrl-back" onclick="goBackToVertical(); event.stopPropagation();">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="pctrl-title" id="pctrl-title">Lessons 1 / 10</div>
      <button class="pctrl-vol-btn" onclick="event.stopPropagation();" title="Sound">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
    </div>

    <div class="pctrl-mid">
      <button class="seek-btn" onclick="doSeek(-10); event.stopPropagation();">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
        10s
      </button>
      <button class="p-play-btn" id="p-play-btn" onclick="togglePlay(); event.stopPropagation();">
        <span id="p-play-icon">
          <svg viewBox="0 0 24 24" fill="#fff" width="24" height="24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </span>
      </button>
      <button class="seek-btn" onclick="doSeek(10); event.stopPropagation();">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
        10s
      </button>
    </div>

    <div class="pctrl-bot">
      <!-- progress bar — same as portrait .prog-track-row -->
      <div class="prog-track-row" id="prog-track" onclick="trackClick(event); event.stopPropagation();">
        <div class="prog-fill" id="prog-fill"><div class="prog-dot"></div></div>
      </div>
      <!-- time left, chevron right -->
      <div class="prog-bottom-row">
        <span class="prog-time-label" id="prog-time">0:00 / 1:30</span>
        <button class="go-list-btn" onclick="openSheet(); event.stopPropagation();" title="All videos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </div>
    </div>

  </div><!-- /pctrl -->

  <!-- Sheet backdrop -->
  <div class="sheet-backdrop" id="backdrop" onclick="closeSheet()"></div>

  <!-- Bottom sheet — light theme -->
  <div class="sheet" id="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="sheet-title">Lesson 1 / 10</div>
    </div>
    <div class="sheet-list" id="sheet-list"></div>
  </div>

</div><!-- /phone -->

<script>
const VIDEOS = [
  { title: 'Understanding the Highway Code',          dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?w=800&q=80&auto=format&fit=crop' },
  { title: 'Motorway driving & lane discipline',      dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1545558014-8692077e9b5c?w=800&q=80&auto=format&fit=crop' },
  { title: 'Roundabouts: priority & lane choice',     dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1519003722824-194d4455a60c?w=800&q=80&auto=format&fit=crop' },
  { title: 'Speed limits & smart motorways',          dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?w=800&q=80&auto=format&fit=crop' },
  { title: 'Road signs you must know',                dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80&auto=format&fit=crop' },
  { title: 'Hazard perception skills',                dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1489824904134-891ab64532f1?w=800&q=80&auto=format&fit=crop' },
  { title: 'Parking rules & restrictions',            dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1506521781263-d8422e82f27a?w=800&q=80&auto=format&fit=crop' },
  { title: 'Night driving & adverse conditions',      dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=800&q=80&auto=format&fit=crop' },
  { title: 'Stopping distances explained',            dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800&q=80&auto=format&fit=crop' },
  { title: 'Theory test: what to expect on the day', dur: '1:30', durSec: 90, thumb: 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=800&q=80&auto=format&fit=crop' },
];

const watchedState = new Array(VIDEOS.length).fill(false);
const progressPct  = new Array(VIDEOS.length).fill(0);

let curIdx = 0;
let isPlaying = false, playTimer = null, ctrlTO = null;

const SVG_PLAY  = `<svg viewBox="0 0 24 24" fill="#fff" width="24" height="24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
const SVG_PAUSE = `<svg viewBox="0 0 24 24" fill="#fff" width="24" height="24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`;
const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

/* ── URL param restore (handoff from vertical player) ── */
(function () {
  const p  = new URLSearchParams(location.search);
  const vi = parseInt(p.get('v'));
  const pi = parseFloat(p.get('p'));
  if (!isNaN(vi) && vi >= 0 && vi < VIDEOS.length) curIdx = vi;
  if (!isNaN(pi)) progressPct[curIdx] = Math.min(100, Math.max(0, pi));
})();

/* ── Navigation ── */
function goBackToVertical() {
  pausePlay();
  window.location.href = `UK video vertical.html?v=${curIdx}&p=${Math.round(progressPct[curIdx])}`;
}

function openVideo(idx, anim) {
  pausePlay();
  curIdx = idx;
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('vis');
  updatePlayer(anim);
  setTimeout(startPlay, 280);
}

function updatePlayer(anim) {
  const v  = VIDEOS[curIdx];
  const bg = document.getElementById('vid-bg');
  bg.src = v.thumb;
  if (anim) { bg.classList.remove('anim-next','anim-prev'); void bg.offsetWidth; bg.classList.add(anim); }
  document.getElementById('pctrl-title').textContent = v.title;
  const st = document.getElementById('sheet-title');
  if (st) st.textContent = `Lesson ${curIdx + 1} / ${VIDEOS.length}`;
  syncProgUI();
  showCtrl();
}

/* ── Play / pause ── */
function togglePlay() { isPlaying ? pausePlay() : startPlay(); }

function startPlay() {
  isPlaying = true;
  document.getElementById('p-play-icon').innerHTML = SVG_PAUSE;
  clearInterval(playTimer);
  playTimer = setInterval(tick, 200);
  resetCtrlTimer();
}

function pausePlay() {
  isPlaying = false;
  clearInterval(playTimer);
  const icon = document.getElementById('p-play-icon');
  if (icon) icon.innerHTML = SVG_PLAY;
}

function tick() {
  progressPct[curIdx] = Math.min(100, progressPct[curIdx] + 0.5);
  if (progressPct[curIdx] >= 85) markWatched(curIdx);
  if (progressPct[curIdx] >= 100) {
    pausePlay();
    /* auto-advance to next video */
    if (curIdx < VIDEOS.length - 1) setTimeout(() => openVideo(curIdx + 1, 'anim-next'), 400);
    return;
  }
  syncProgUI();
}

/* ── Seek ── */
function doSeek(secs) {
  const delta = (secs / VIDEOS[curIdx].durSec) * 100;
  progressPct[curIdx] = Math.max(0, Math.min(100, progressPct[curIdx] + delta));
  syncProgUI();
  resetCtrlTimer();
}

function trackClick(e) {
  const rect = document.getElementById('prog-track').getBoundingClientRect();
  progressPct[curIdx] = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
  syncProgUI();
  resetCtrlTimer();
}

function syncProgUI() {
  const v   = VIDEOS[curIdx];
  const pct = progressPct[curIdx];
  const cur = pct / 100 * v.durSec;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-time').textContent  = fmt(cur) + ' / ' + v.dur;
  /* update sheet list pbar if rendered */
  const pb = document.getElementById(`un-pb-${curIdx}`);
  if (pb) pb.style.width = pct + '%';
}

/* ── Controls visibility ── */

/*
  onPctrlTap: called when user taps the pctrl overlay (z:10).
  - buttons inside pctrl call event.stopPropagation() so they never reach here
  - pctrl-top and pctrl-bot are tagged cursor:default and have stopProp on their children
  - we only act on taps in the neutral video area (outside top/bot bars)
  - left 30% → seek back, right 30% → seek fwd, center → hide controls
*/
function onPctrlTap(e) {
  /* ignore if the tap originated inside the top or bottom bars */
  if (e.target.closest('.pctrl-top, .pctrl-bot')) return;

  const rect = document.getElementById('pctrl').getBoundingClientRect();
  const xPct = (e.clientX - rect.left) / rect.width;

  if (xPct < 0.30) {
    doSeek(-10);
    flashSeek('l');
  } else if (xPct > 0.70) {
    doSeek(10);
    flashSeek('r');
  } else {
    /* center tap — hide controls */
    document.getElementById('pctrl').classList.add('fade');
    clearTimeout(ctrlTO);
  }
}

function flashSeek(side) {
  const el = document.getElementById(side === 'l' ? 'flash-l' : 'flash-r');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

function showCtrl() {
  document.getElementById('pctrl').classList.remove('fade');
  resetCtrlTimer();
}
function resetCtrlTimer() {
  clearTimeout(ctrlTO);
  ctrlTO = setTimeout(() => { document.getElementById('pctrl').classList.add('fade'); }, 3500);
}

/* ── Watched state ── */
function markWatched(idx) {
  if (watchedState[idx]) return;
  watchedState[idx] = true;
  const badge = document.getElementById(`un-w-${idx}`);
  if (badge) badge.classList.add('show');
}

/* ── Bottom sheet ── */
function buildSheetList() {
  /* exact same un-card structure as vertical buildUpNext() */
  document.getElementById('sheet-list').innerHTML = VIDEOS.map((v, i) => `
    <div class="un-card ${i === curIdx ? 'now' : ''}" onclick="openVideo(${i})">
      <div class="un-thumb-wrap">
        <img class="un-thumb" src="${v.thumb}" alt="${v.title}" loading="lazy" />
        <div class="un-dur">${v.dur}</div>
      </div>
      <div class="un-body">
        <div class="un-num">Lesson ${i + 1}</div>
        <div class="un-title">${v.title}</div>
      </div>
      <div class="un-watched ${watchedState[i] ? 'show' : ''}" id="un-w-${i}">${CHECK_SVG}</div>
    </div>
  `).join('');
}

function openSheet() {
  pausePlay();
  document.getElementById('sheet-title').textContent = `Lesson ${curIdx + 1} / ${VIDEOS.length}`;
  buildSheetList();
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('vis');
  setTimeout(() => {
    const cards = document.querySelectorAll('.un-card');
    if (cards[curIdx]) cards[curIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 370);
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('vis');
  setTimeout(startPlay, 300);
}

/* ── Swipe up from bottom to open sheet ── */
let swipeStartY = 0, swipeStartX = 0;
const phone = document.getElementById('phone');

phone.addEventListener('touchstart', e => {
  swipeStartY = e.touches[0].clientY;
  swipeStartX = e.touches[0].clientX;
}, { passive: true });

phone.addEventListener('touchend', e => {
  /* don't trigger if sheet is already open */
  if (document.getElementById('sheet').classList.contains('open')) return;

  const endY = e.changedTouches[0].clientY;
  const endX = e.changedTouches[0].clientX;
  const dy   = swipeStartY - endY;          /* positive = swipe up */
  const dx   = Math.abs(endX - swipeStartX);

  /* normalise start Y relative to the phone element */
  const phoneRect    = phone.getBoundingClientRect();
  const localStartY  = swipeStartY - phoneRect.top;

  /* upward swipe, starting from bottom 35% of phone, mostly vertical */
  if (localStartY > phoneRect.height * 0.65 && dy > 30 && dx < 80) {
    openSheet();
  }
}, { passive: true });

/* ── Utils ── */
function fmt(secs) {
  const s = Math.max(0, Math.floor(secs));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

/* ── Init ── */
updatePlayer();
setTimeout(startPlay, 400);
</script>
